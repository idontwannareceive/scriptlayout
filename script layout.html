<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>分行文字一鍵複製器</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --success-color: #10b981;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-sub: #6b7280;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 1.25rem;
            margin-bottom: 1rem;
            text-align: center;
            color: var(--primary-color);
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
            line-height: 1.5;
        }

        textarea:focus {
            border-color: var(--primary-color);
        }

        .btn-group {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .btn-generate { background: var(--primary-color); color: white; }
        .btn-clear { background: #ef4444; color: white; }
        .btn-copy-all { background: #6b7280; color: white; }

        button:active { transform: scale(0.98); }

        .info-bar {
            font-size: 14px;
            color: var(--text-sub);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        /* 列表區域 */
        #copy-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }

        .copy-item {
            position: relative;
            background: #fff;
            border: 1px solid #e5e7eb;
            padding: 15px 15px 15px 50px; /* 留位置給序號 */
            border-radius: 10px;
            cursor: pointer;
            word-break: break-all;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
            font-size: 16px;
            line-height: 1.4;
            display: flex;
            align-items: center;
        }

        /* 序號樣式 */
        .copy-item::before {
            content: attr(data-index);
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 40px;
            background: #f9fafb;
            border-right: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #9ca3af;
            border-top-left-radius: 10px;
            border-bottom-left-radius: 10px;
        }

        .copy-item:hover {
            border-color: var(--primary-color);
            background-color: #f5f3ff;
        }

        /* 點擊成功狀態 */
        .copy-item.success {
            background-color: #ecfdf5;
            border-color: var(--success-color);
        }

        .copy-item.success::after {
            content: "✓ 已複製";
            position: absolute;
            right: 15px;
            color: var(--success-color);
            font-weight: bold;
            font-size: 12px;
        }

        /* 手機適應 */
        @media (max-width: 480px) {
            .btn-group { grid-template-columns: 1fr; }
            .container { padding: 15px; border-radius: 0; }
            body { padding: 0; }
            .copy-item { padding: 18px 15px 18px 45px; } /* 手機行高加強，更好按 */
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📋 分行文字一鍵複製器</h1>
    
    <textarea id="inputSource" placeholder="在此貼上多行文字或時間戳內容..."></textarea>
    
    <div class="btn-group">
        <button class="btn-generate" onclick="generateList()">產生可複製列表</button>
        <button class="btn-copy-all" onclick="copyAll()">複製全部</button>
        <button class="btn-clear" onclick="clearAll()">清空</button>
    </div>

    <div class="info-bar">
        <span id="line-stats">總行數：0</span>
        <span id="tip">提示：點擊下方方塊即可複製該行</span>
    </div>

    <div id="copy-list">
        <!-- 動態生成內容 -->
    </div>
</div>

<script>
    function generateList() {
        const source = document.getElementById('inputSource').value;
        const listContainer = document.getElementById('copy-list');
        const stats = document.getElementById('line-stats');
        
        listContainer.innerHTML = '';
        
        // 分行並過濾掉純空行，但保留包含空格的行
        const lines = source.split(/\r?\n/).filter(line => line.trim() !== '');
        
        lines.forEach((line, index) => {
            const div = document.createElement('div');
            div.className = 'copy-item';
            div.setAttribute('data-index', index + 1);
            div.textContent = line;
            
            // 點擊事件
            div.onclick = function() {
                copyToClipboard(line, div);
            };
            
            listContainer.appendChild(div);
        });
        
        stats.textContent = `總行數：${lines.length}`;
        
        // 手機端自動滾動到列表起始位置
        if(lines.length > 0) {
            document.getElementById('tip').scrollIntoView({ behavior: 'smooth' });
        }
    }

    async function copyToClipboard(text, element) {
        try {
            await navigator.clipboard.writeText(text);
            
            // 視覺反饋
            element.classList.add('success');
            setTimeout(() => {
                element.classList.remove('success');
            }, 1000);
            
        } catch (err) {
            // 備用方案 (針對舊版瀏覽器)
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand("copy");
            document.body.removeChild(textArea);
            
            element.classList.add('success');
            setTimeout(() => {
                element.classList.remove('success');
            }, 1000);
        }
    }

    function copyAll() {
        const source = document.getElementById('inputSource').value;
        if (!source) return;
        
        navigator.clipboard.writeText(source).then(() => {
            alert('已複製全部原始內容');
        });
    }

    function clearAll() {
        if (confirm('確定要清空所有內容嗎？')) {
            document.getElementById('inputSource').value = '';
            document.getElementById('copy-list').innerHTML = '';
            document.getElementById('line-stats').textContent = '總行數：0';
        }
    }

    // 支援按下產生後的簡單反饋
    document.getElementById('inputSource').addEventListener('input', function() {
        const lines = this.value.split(/\r?\n/).filter(line => line.trim() !== '');
        document.getElementById('line-stats').textContent = `待處理行數：${lines.length}`;
    });
</script>

</body>
</html>
